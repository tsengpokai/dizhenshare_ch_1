                                <path d="M 90 64 A 15 15 0 0 0 100 60" fill="none" stroke="#fff" strokeWidth="1" />
                                <text x="80" y="60" fill="#fff" fontSize="10">i</text>
                                <path d="M 100 95 A 20 20 0 0 0 118 85" fill="none" stroke="#fff" strokeWidth="1" />

                                        <line key={`p-${i}`} x1={10 + i*12} y1="35" x2={10 + i*12} y2="65" stroke="#3b82f6" strokeWidth="2" className="wave-p" style={{ animationDelay: `${i * 0.1}s` }} />
                                    ))}
                                </g>
                                <text x="10" y="90" fill="#94a3b8" fontSize="10">S-wave (Shear)</text>
                                <g>
                                    {[...Array(15)].map((_, i) => (
                                        <circle key={`s-${i}`} cx={10 + i*12} cy="115" r="3" fill="#f59e0b" className="wave-s" style={{ animationDelay: `${i * 0.1}s` }} />
                                    ))}

                        );
                    case "shadow":
                        return (
                            <svg viewBox="0 0 200 150" className="w-full h-full">
                                <circle cx="100" cy="75" r="60" fill="#1e293b" stroke="#475569" strokeWidth="2" />
                                <circle cx="100" cy="75" r="32" fill="#ef4444" opacity="0.8" />
                                <text x="85" y="78" fill="#fff" fontSize="8">Outer Core</text>
                                <circle cx="100" cy="15" r="4" fill="#fbbf24" className="animate-pulse" />
                                <text x="88" y="10" fill="#fbbf24" fontSize="8">Focus</text>
                                <path d="M 100 15 Q 160 50 158 90" fill="none" stroke="#3b82f6" strokeWidth="1" strokeDasharray="2 2" />
                                <path d="M 100 15 Q 40 50 42 90" fill="none" stroke="#3b82f6" strokeWidth="1" strokeDasharray="2 2" />
                                <path d="M 100 15 L 120 50 L 115 100 L 130 128" fill="none" stroke="#3b82f6" strokeWidth="1.5" />
                                <path d="M 100 15 L 80 50 L 85 100 L 70 128" fill="none" stroke="#3b82f6" strokeWidth="1.5" />
                                <path d="M 40 95 A 65 65 0 0 0 65 130" fill="none" stroke="#f59e0b" strokeWidth="3" opacity="0.5" />
                                <path d="M 160 95 A 65 65 0 0 1 135 130" fill="none" stroke="#f59e0b" strokeWidth="3" opacity="0.5" />
                                <text x="10" y="115" fill="#f59e0b" fontSize="8">Shadow Zone</text>
                            </svg>

                    case "beachball":
                        return (
                            <svg viewBox="0 0 200 150" className="w-full h-full">
                                <g transform="translate(50, 75)">
                                    <circle cx="0" cy="0" r="30" fill="#1e293b" stroke="#fff" strokeWidth="1" />
                                    <path d="M -20 -22 C -5 -5, -5 5, -20 22 A 30 30 0 0 1 -20 -22 Z" fill="#fff" />
                                    <path d="M 20 -22 C 5 -5, 5 5, 20 22 A 30 30 0 0 0 20 -22 Z" fill="#fff" />
                                    <text x="-15" y="45" fill="#94a3b8" fontSize="10">Normal Fault</text>
                                    <path d="M -10 0 L -30 0 M -10 -5 L -10 5" stroke="#ef4444" strokeWidth="1" />

                                </g>
                            </svg>

                    case "resonance":
                        return (
                            <svg viewBox="0 0 200 150" className="w-full h-full">
                                <line x1="0" y1="130" x2="200" y2="130" stroke="#64748b" strokeWidth="4" />
                                <text x="100" y="145" fill="#94a3b8" fontSize="8" textAnchor="middle">Seismic Wave Frequency ≈ 1.0s</text>
                                <rect x="30" y="100" width="20" height="30" fill="#334155" stroke="#94a3b8" className="sway-small" style={{transformOrigin: "40px 130px"}} />
                                <rect x="90" y="60" width="20" height="70" fill="#ef4444" stroke="#fca5a5" className="sway-large" style={{transformOrigin: "100px 130px"}} />

                            </svg>
                        );
                    case "seismicgap":
                        return (
                            <svg viewBox="0 0 200 150" className="w-full h-full">
                                <rect x="20" y="60" width="160" height="30" fill="#1e293b" stroke="#334155" />
                                <line x1="20" y1="75" x2="180" y2="75" stroke="#ef4444" strokeWidth="2" strokeDasharray="5 5" />

                                <text x="142" y="52" fill="#10b981" fontSize="8">Ruptured 2005</text>
                                <rect x="70" y="60" width="60" height="30" fill="#ef4444" opacity="0.4" className="pulse-gap" />
                                <text x="80" y="52" fill="#ef4444" fontSize="10" fontWeight="bold">Seismic Gap</text>
                                <text x="82" y="95" fill="#fca5a5" fontSize="8">Stress Build-up</text>
                                <path d="M 100 100 L 100 120 M 95 115 L 100 120 L 105 115" stroke="#ef4444" strokeWidth="2" fill="none" />
                                <path d="M 100 50 L 100 30 M 95 35 L 100 30 L 105 35" stroke="#ef4444" strokeWidth="2" fill="none" />
                            </svg>
                        );
                    case "inverse":
                        return (
                            <svg viewBox="0 0 200 150" className="w-full h-full">
                                <line x1="20" y1="130" x2="180" y2="130" stroke="#94a3b8" strokeWidth="1" />
                                <line x1="20" y1="130" x2="20" y2="20" stroke="#94a3b8" strokeWidth="1" />
                                <text x="80" y="145" fill="#94a3b8" fontSize="10">Distance (x)</text>
                                <text x="2" y="80" fill="#94a3b8" fontSize="10" transform="rotate(-90 10,80)">Travel Time</text>

                                <path d="M 20 110 Q 90 80 180 20" fill="none" stroke="#3b82f6" strokeWidth="2" className="draw-path" />
                                <path d="M 20 120 Q 50 90 90 70 T 180 10" fill="none" stroke="#10b981" strokeWidth="2" strokeDasharray="4 4" className="draw-path" style={{animationDelay: "1s"}} />
                                <path d="M 20 100 C 50 100, 90 50, 140 40 S 160 30 180 25" fill="none" stroke="#f59e0b" strokeWidth="2" strokeDasharray="2 2" className="draw-path" style={{animationDelay: "2s"}} />
                            </svg>

                    case "subduction":
                        return (
                            <svg viewBox="0 0 200 150" className="w-full h-full">

                    case "reflection":
                        return (
                            <svg viewBox="0 0 200 150" className="w-full h-full">
                                <rect x="0" y="60" width="200" height="30" fill="#334155" />

                                <rect x="20" y="45" width="20" height="10" fill="#94a3b8" />
                                <circle cx="30" cy="60" r="4" fill="#ef4444" className="animate-pulse" />
                                {[...Array(5)].map((_, i) => (
                                    <rect key={`rec-${i}`} x={60 + i*20} y="55" width="4" height="4" fill="#10b981" />
                                ))}
                                <path d="M 30 60 L 100 75 L 140 55" fill="none" stroke="#fcd34d" strokeWidth="1" strokeDasharray="2 2" className="draw-path" />

                        return (
                            <svg viewBox="0 0 200 150" className="w-full h-full">

                        @keyframes wave-p-anim {
                            0%, 100% { transform: translateX(0); }
                            50% { transform: translateX(8px); }

                        .wave-p { animation: wave-p-anim 2s infinite ease-in-out; }
                        
                        @keyframes wave-s-anim {
                            0%, 100% { transform: translateY(0); }
                            50% { transform: translateY(15px); }
                        }
                        .wave-s { animation: wave-s-anim 1.5s infinite ease-in-out; }

                        @keyframes sway-small-anim {
                            0%, 100% { transform: rotate(0deg); }
                            25% { transform: rotate(2deg); }
                            75% { transform: rotate(-2deg); }
                        }
                        .sway-small { animation: sway-small-anim 3s infinite ease-in-out; }

                        @keyframes sway-large-anim {
                            0%, 100% { transform: rotate(0deg); }
                            25% { transform: rotate(15deg); }
                            75% { transform: rotate(-15deg); }
                        }
                        .sway-large { animation: sway-large-anim 1s infinite ease-in-out; }

                        @keyframes wave-travel-anim {
                            0% { stroke-dashoffset: 40; }
                            100% { stroke-dashoffset: 0; }
                        }
                        .wave-travel {
                            stroke-dasharray: 40 40;
                            animation: wave-travel-anim 1s linear infinite;
                        }

                        @keyframes pulse-gap-anim {
                            0%, 100% { opacity: 0.3; }
                            50% { opacity: 0.7; fill: #b91c1c; }

                            animation: draw-path-anim 3s forwards infinite;

                            0% { transform: translate(-10px, -10px); }
                            100% { transform: translate(10px, 10px); }
                        }
                        .plate-slide { animation: plate-slide-anim 5s infinite alternate ease-in-out; }
                    `}} />

                    <header className="bg-slate-900 border-b border-slate-800 p-6 shadow-xl relative overflow-hidden">

                            <div className="space-y-2 overflow-y-auto max-h-[75vh] pr-2 custom-scrollbar">
                                {topics.map((topic, index) => (
                                    <button
                                        key={topic.id}

                                        className={`w-full text-left p-4 rounded-xl transition-all duration-300 flex items-center gap-3 border ${
                                            activeTopic === index 
                                            ? 'bg-blue-900/30 border-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.2)]' 
                                            : 'bg-slate-900 border-slate-800 hover:bg-slate-800 hover:border-slate-700'
                                        }`}
                                    >
                                        <div className={`${activeTopic === index ? 'text-blue-400' : 'text-slate-500'}`}>
                                            {topic.icon}
                                        </div>
                                        <span className={`flex-1 font-medium leading-tight ${activeTopic === index ? 'text-blue-100' : 'text-slate-400'}`}>
                                            {index + 1}. {topic.title}
                                        </span>
                                        <Icon name="ChevronRight" className={`w-5 h-5 transition-transform ${activeTopic === index ? 'text-blue-500 rotate-90' : 'text-slate-600'}`} />
                                    </button>
                                ))}

                                <div className="flex items-center gap-3 mb-6">

                                    <h2 className="text-2xl font-bold text-white">{topics[activeTopic].title}</h2>

                                        Interactive Concept Visualization
                                    </div>
                                    {renderSVG(topics[activeTopic].svgType)}
                                </div>

                                <div className="flex-1 flex flex-col gap-4">
                                    <div className="bg-slate-800/50 rounded-xl p-5 border border-slate-700">
                                        <h3 className="text-lg font-semibold text-blue-300 mb-2 flex items-center gap-2">

                                                <h3 className="text-emerald-400 font-semibold mb-2 flex items-center gap-2">
                                                    <span className="bg-emerald-500/20 text-emerald-400 w-6 h-6 flex items-center justify-center rounded-md text-sm">A</span>
                                                    精準解答
                                                </h3>
                                                <p className="text-slate-200 leading-relaxed font-medium relative z-10">{topics[activeTopic].answer}</p>
                                            </div>

                                            <div className="bg-slate-800/50 rounded-xl p-5 border border-slate-700">
                                                <h3 className="text-blue-300 font-semibold mb-2">深入探討物理現象</h3>

                                                    {topics[activeTopic].explanation}

                                            </div>

                                                <h3 className="text-amber-400 font-semibold mb-2 flex items-center gap-2">
                                                    <LightbulbIcon className="w-4 h-4" /> 具象化舉例

                                                <p className="text-slate-300 leading-relaxed italic text-sm md:text-base">

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SeismologyApp />);
    </script>
