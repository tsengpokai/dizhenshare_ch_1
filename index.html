            .draw-path { stroke-dasharray:300; stroke-dashoffset:300; animation: draw-path-anim 3.2s forwards infinite; }
            .plate-slide { animation: plate-slide-anim 5s infinite alternate ease-in-out; }
            .pulse-dot { animation: pulse-dot-anim 2s infinite ease-in-out; transform-origin:center; }
            .bubble-rise { animation: bubble-rise-anim 1.8s infinite alternate ease-in-out; }
            .sink-box { animation: sink-box-anim 2.3s infinite ease-in-out; }
            .fade-enter { animation: fadeUp .45s ease-out both; }
            .custom-scrollbar::-webkit-scrollbar { width: 10px; }
            .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(71,85,105,.85); border-radius: 999px; }
            .custom-scrollbar::-webkit-scrollbar-track { background: rgba(15,23,42,.6); border-radius: 999px; }
          `}</style>

          <header className="relative overflow-hidden border-b border-slate-800 bg-slate-900/85 backdrop-blur-sm">
            <div className="absolute inset-0 opacity-15 pointer-events-none">
              <svg preserveAspectRatio="none" className="h-full w-full" viewBox="0 0 1000 140">
                <path d="M0 70 L120 70 L130 28 L144 112 L158 66 L214 70 L228 20 L244 114 L262 58 L280 84 L300 70 L1000 70" fill="none" stroke="#22d3ee" strokeWidth="2" />
              </svg>
            </div>
            <div className="relative z-10 mx-auto max-w-7xl px-6 py-8 md:px-8 md:py-10">
              <div className="flex items-center gap-4">
                <div className="rounded-2xl border border-cyan-400/25 bg-cyan-500/15 p-3 text-cyan-300 shadow-[0_0_25px_rgba(34,211,238,0.10)]">
                  <Icon name="Activity" className="w-8 h-8" />
                </div>
                <div>
                  <h1 className="text-3xl md:text-4xl font-black tracking-wide text-white">高等地震學探究 <span className="text-cyan-300">Chapter 1</span></h1>
                  <p className="mt-2 text-slate-400 leading-7">互動式問答、圖說、動畫與 SVG 視覺化整合版｜可直接作為 GitHub Pages 的 index.html 使用</p>
                </div>
              </div>
            </div>
          </header>

          <main className="mx-auto grid max-w-7xl gap-6 px-4 py-6 md:px-6 lg:grid-cols-[320px_1fr]">
            <aside className="lg:sticky lg:top-6 h-fit">
              <Card className="p-4">
                <div className="mb-4 px-2 text-xs font-bold uppercase tracking-[0.28em] text-slate-400">十一大主題導航</div>
                <div className="space-y-2 max-h-[78vh] overflow-auto pr-1 custom-scrollbar">
                  {sections.map((s) => (
                    <button
                      key={s.id}
                      onClick={() => setActiveSection(s.id)}
                      className={`w-full rounded-2xl border px-4 py-4 text-left transition-all duration-300 flex items-center gap-3 ${activeSection === s.id ? 'border-cyan-400/40 bg-cyan-500/10 shadow-[0_0_18px_rgba(34,211,238,0.12)]' : 'border-slate-800 bg-slate-950/40 hover:border-slate-700 hover:bg-slate-800/70'}`}
                    >
                      <div className={activeSection === s.id ? 'text-cyan-300' : 'text-slate-500'}>{s.icon}</div>
                      <div className="flex-1 min-w-0">
                        <div className={`text-xs mb-1 ${activeSection === s.id ? 'text-cyan-400' : 'text-slate-500'}`}>SECTION {String(s.id).padStart(2,'0')}</div>
                        <div className={`text-sm leading-6 font-medium ${activeSection === s.id ? 'text-white' : 'text-slate-300'}`}>{s.title}</div>
                      </div>
                    </button>
                  ))}
                </div>
              </Card>
            </aside>

            <section className="space-y-6">
              {renderSection()}
            </section>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
